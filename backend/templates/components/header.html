{% load static %}
<nav class="header-nav">
    <!-- 좌측: 메뉴 + 로고 -->
    <div class="header-left">
        <button class="hamburger" id="menu-toggle" aria-label="메뉴 열기">
            <span></span><span></span><span></span>
        </button>
        <a href="{% url 'dashboard' %}" class="logo-link">
            <img src="{% static 'images/logo.svg' %}" alt="로고" class="logo-img">
        </a>
        <h1 class="system-title">산재 예방 통합 관제시스템</h1>
    </div>

    <!-- 중앙: 사용자 정보 + 메뉴 -->
    <div class="header-center">
        <div class="user-badge">
            <span class="user-name">{{ request.user.get_full_name|default:request.user.username }}</span>
            <span class="user-role">{{ request.user.profile.role_display|default:"관리자" }}</span>
        </div>
        <a href="{% url 'dashboard' %}" class="nav-btn {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            관리자 메뉴
        </a>
    </div>

    <!-- 우측: 시각 + 홈 + 로그아웃 -->
    <div class="header-right">
        <div class="system-time">
            <div class="time-row">
                <span class="time-label">현재 시스템 시각</span>
                <span class="time-value" id="current-time">--</span>
            </div>
            <div class="time-row">
                <span class="time-label">마지막 갱신 시각</span>
                <span class="time-value time-small" id="last-refresh">--</span>
                <button class="refresh-btn" id="refresh-btn" aria-label="새로고침">↻</button>
            </div>
        </div>
        <a href="{% url 'dashboard' %}" class="icon-btn" aria-label="홈">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
            </svg>
        </a>
        <a href="{% url 'logout' %}" class="icon-btn icon-btn--danger" aria-label="로그아웃">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            로그아웃
        </a>
    </div>
</nav>

<script>
(function() {
    function pad(n) { return String(n).padStart(2, '0'); }
    function fmt(d) {
        return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
               + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    function tick() {
        var el = document.getElementById('current-time');
        if (el) el.textContent = fmt(new Date());
    }
    tick();
    setInterval(tick, 1000);

    document.getElementById('refresh-btn')?.addEventListener('click', function() {
        var el = document.getElementById('last-refresh');
        if (el) el.textContent = fmt(new Date());
        document.dispatchEvent(new CustomEvent('safetyRefresh'));
    });
})();
</script>
